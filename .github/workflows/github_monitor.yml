name: GitHub Project Monitor

on:
  schedule:
    # 每小时运行一次GitHub项目监控
    - cron: '0 * * * *'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      categories:
        description: '要监控的类别（逗号分隔，留空监控所有）'
        required: false
        default: ''
      force_run:
        description: '强制运行（忽略重复检查）'
        type: boolean
        required: false
        default: false

jobs:
  github-monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 获取完整历史以避免推送冲突
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests PyYAML python-dateutil
        
    - name: Create data directory
      run: |
        mkdir -p data
        mkdir -p output
        
    - name: Run GitHub Project Monitor
      env:
        # 修正：使用 GH_TOKEN 而不是 GITHUB_TOKEN
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
        DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CATEGORIES: ${{ github.event.inputs.categories }}
        FORCE_RUN: ${{ github.event.inputs.force_run }}
      run: |
        echo "开始GitHub项目监控..."
        python github_monitor.py
        
    - name: Generate monitoring report
      run: |
        echo "# GitHub项目监控报告" > output/github_monitor_report.md
        echo "生成时间: $(date)" >> output/github_monitor_report.md
        echo "" >> output/github_monitor_report.md
        
        if [ -f "data/seen_github_projects.json" ]; then
          project_count=$(cat data/seen_github_projects.json | jq length 2>/dev/null || echo "0")
          echo "已监控项目总数: $project_count" >> output/github_monitor_report.md
        fi
        
        echo "" >> output/github_monitor_report.md
        echo "## 监控配置" >> output/github_monitor_report.md
        echo "- 监控频率: 每小时" >> output/github_monitor_report.md
        echo "- 支持类别: AI/ML, MCP工具, Web开发, 移动开发, DevOps等" >> output/github_monitor_report.md
        echo "- AI分析: ModelScope Qwen3-Coder集成" >> output/github_monitor_report.md
        
    - name: Pull latest changes and commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 先拉取最新更改以避免冲突
        git pull origin master --rebase || git pull origin master
        
        # 提交数据文件（如果有变化）
        if [ -f "data/seen_github_projects.json" ]; then
          git add data/seen_github_projects.json
        fi
        
        # 提交报告文件
        git add output/github_monitor_report.md
        
        # 检查是否有变化需要提交
        if git diff --staged --quiet; then
          echo "没有新的监控数据需要提交"
        else
          git commit -m "GitHub项目监控: $(date '+%Y-%m-%d %H:%M')" || echo "提交失败，可能没有变化"
          git push origin master || echo "推送失败，将在artifacts中保存结果"
        fi
        
    - name: Upload monitoring artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: github-monitor-results-${{ github.run_number }}
        path: |
          output/
          data/seen_github_projects.json
        retention-days: 30
        compression-level: 6
        
    - name: Notify on failure
      if: failure()
      env:
        WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
      run: |
        if [ -n "$WEWORK_WEBHOOK_URL" ]; then
          curl -X POST "$WEWORK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text",
              "text": {
                "content": "⚠️ GitHub项目监控任务失败\n时间: '"$(date)"'\n运行编号: ${{ github.run_number }}\n请检查GitHub Actions日志"
              }
            }'
        fi
        
    - name: Notify on success
      if: success()
      env:
        WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
      run: |
        if [ -n "$WEWORK_WEBHOOK_URL" ]; then
          # 检查是否有新项目被发现
          if [ -f "output/github_monitor_report.md" ]; then
            project_count=$(cat data/seen_github_projects.json | jq length 2>/dev/null || echo "0")
            curl -X POST "$WEWORK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "msgtype": "text",
                "text": {
                  "content": "✅ GitHub项目监控完成\n时间: '"$(date)"'\n已监控项目总数: '"$project_count"'\n运行编号: ${{ github.run_number }}"
                }
              }'
          fi
        fi